    <!-- 内部CSS样式（也可以通过link引入外部CSS文件） -->
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            /* 字体：微软雅黑/无衬线字体 */
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
        }

        /* 头部样式 */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
        }

        /* 导航栏样式 */
        nav {
            background-color: #34495e;
            padding: 0.8rem;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            color: #3498db;
            /* 鼠标悬浮时变色 */
        }

        /* 主体内容容器 */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            display: flex;
            gap: 2rem;
            padding: 0 1rem;
        }

        /* 主要内容区 */
        main {
            flex: 3;
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* 侧边栏 */
        aside {
            flex: 1;
            background-color: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* 页脚样式 */
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        /* 响应式适配：屏幕宽度小于768px时，容器改为垂直排列 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            nav ul {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
	
	<style>
		/* 定义按钮样式类 */
		.button1
		{
		  background: #25A1F4;
		  color: white;
		  padding: 4px 8px;
		  border: none;
		  border-radius: 6px;
		  cursor: pointer;
		  transition: background 0.2s; /* 过渡动画，更丝滑 */
		}
		/* 悬浮效果 */
		.button1:hover
		{
		  background: #1987D8; /* 深色一点的蓝色 */
		}
		/* 点击效果 */
		.button1:active
		{
		  background: #0F6EB8;
		}
	</style>
	
	<style>
		/* 重置链接默认样式 */
		a {
		  color: #25A1F4; /* 主色调（可替换成自己的品牌色） */
		  text-decoration: none; /* 去掉默认下划线 */
		  font-weight: 500; /* 轻微加粗，提升辨识度 */
		  position: relative; /* 为hover下划线做准备 */
		}

		/* hover 下划线动画效果 */
		a::after {
		  content: '';
		  position: absolute;
		  bottom: -2px;
		  left: 0;
		  width: 0;
		  height: 1px; /* 细下划线 */
		  background-color: #25A1F4;
		  transition: width 0.1s ease; /* 动画过渡，更丝滑 */
		}

		a:hover::after {
		  width: 100%; /* hover时下划线展开 */
		}

		/* 去掉点击后的高亮（可选） */
		a:focus {
		  outline: none;
		}

		/* 已访问链接保持同色（默认会变紫色，重置） */
		a:visited {
		  color: #25A1F4;
		}
	</style>
</head>
